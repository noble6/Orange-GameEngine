jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Vulkan
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libvulkan-dev \
            vulkan-tools \
            vulkan-validationlayers-dev \
            mesa-vulkan-drivers

      - name: Configure
        run: cmake -S . -B build -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build
